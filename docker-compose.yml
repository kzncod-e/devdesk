services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devdesk
      POSTGRES_PASSWORD: devdesk
      POSTGRES_DB: devdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /srv
    environment:
      DATABASE_URL: postgresql+asyncpg://devdesk:devdesk@postgres:5432/devdesk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-secret-change-me
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: arq app.platform.worker.WorkerSettings
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /srv
    environment:
      DATABASE_URL: postgresql+asyncpg://devdesk:devdesk@postgres:5432/devdesk
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-secret-change-me
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-placeholder}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-placeholder}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nuxt:
    build: ./frontend
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - .nuxt/
            - .output/
    environment:
      # Passed at runtime so Nitro injects it into the client bundle — no rebuild needed.
      NUXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
