services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devdesk
      POSTGRES_PASSWORD: devdesk
      POSTGRES_DB: devdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  api:
    build: ./backend

    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://devdesk:devdesk@postgres:5432/devdesk
      MONGO_URL: mongodb://mongo:27017
      JWT_SECRET: dev-only-secret-change-me
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/static/uploads
    depends_on:
      postgres:
        condition: service_healthy

  nuxt:
    # Runs the production build from the image (node .output/server/index.mjs).
    # The frontend is normally developed on the host (npm run dev); this service
    # serves the built app as part of the full stack. `--watch` rebuilds on change.
    build: ./frontend
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - .nuxt/
            - .output/
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  mongodata:
  uploads_data:
